name: Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  check:
    name: Python 3.12 acceptance check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run local acceptance check
        run: bash scripts/check.sh
